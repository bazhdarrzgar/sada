services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: sada_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: sada
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - sada_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/sada --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Next.js Application Service
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: sada_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/sada
      - MONGO_URL=mongodb://mongodb:27017/sada
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sada_network
    volumes:
      # Mount uploads directory for file persistence with proper permissions
      - upload_data:/app/public/upload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development version (optional - for development with hot reload)
  app-dev:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    container_name: sada_app_dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/sada
      - MONGO_URL=mongodb://mongodb:27017/sada
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sada_network
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/upload:/app/public/upload
    profiles:
      - dev

# Define volumes for persistent data
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  upload_data:
    driver: local

# Define networks
networks:
  sada_network:
    driver: bridge